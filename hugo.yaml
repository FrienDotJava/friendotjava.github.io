params:
  title: "Frendy's Porfolio"
  description: This is my portfolio website where you can get to know me
  # staticPath: ""  # The path to serve the static files from
  favicon: "/fav.png"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether to add mathjax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  mathjax: false

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    # disableThemeToggle: true
    # defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  # color:
  #   textColor: "#343a40"
  #   secondaryTextColor: "#6c757d"
  #   textLinkColor: "#007bff"
  #   backgroundColor: "#eaedf0"
  #   secondaryBackgroundColor: "#64ffda1a"
  #   primaryColor: "#007bff"
  #   secondaryColor: "#f8f9fa"

  #   darkmode:
  #     textColor: "#e4e6eb"
  #     secondaryTextColor: "#b0b3b8"
  #     textLinkColor: "#ffffff"
  #     backgroundColor: "#18191a"
  #     secondaryBackgroundColor: "#212529"
  #     primaryColor: "#ffffff"
  #     secondaryColor: "#212529"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    # showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "Frendy" # Brand name for the brand | default is the title variable
    disableSearch: true
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: false
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Frendy."
    subtitle: "I love data and machine learning"
    content: ""
    image: /images/me.jpeg
    bottomImage:
      enable: true
    # roundImage: true # Make hero image circular | default false
    button:
      enable: true
      name: "Curriculum Vitae"
      url: "https://drive.google.com/drive/folders/1DMK_qLLcdh-LTbb_hd6duzq0X1l2d2PU?usp=sharing"
      download: false
      newPage: true
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/FrienDotJava
        - icon: fab fa-linkedin
          url: https://www.linkedin.com/in/frendy-frendy/

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/me2.jpeg"
    content: |-
      I have a strong passion for technology and innovation. My interests lie in data scientist and machine learning field, supported by a solid foundation in Python for cleaning, preprocessing, and uncovering insights from data.
    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "Python"
        - "PyTorch"
        - "DVC"
        - "Docker"
        - "MLFlow"
        - "HuggingFace"

  # Experience
  experience:
    enable: true
    items:
      - title: "Web Developer Intern"
        company: "PT Kalbe Morinaga Indonesia"
        companyUrl: "https://kalbenutritionals.com/id/produk-kami/morinaga"
        date: "Aug 2025 - Present"
        content: "Your description here."

      - title: "External Code Reviewer"
        company: "Dicoding Indonesia"
        companyUrl: "https://www.dicoding.com/"
        date: "Mar 2025 - Present"
        content: |
          Your description here.

          - Lead backend developer for a product.
          - Created a frontend design for a product.

  # Education
  education:
    enable: true
    # title: "Custom Name"
    index: false
    items:
      - title: "Bachelor of Computer Science in Informaticss"
        school:
          name: "Universitas Atma Jaya Yogyakarta"
          url: "https://uajy.ac.id/"
        date: "2022 - 2026"
        GPA: "3.95 out of 4.0"
        content: |-
          Achieved a perfect grade index in Basic Programming, Data Structures, Object-Oriented Programming, Web Programming, Machine Learning, Platform-Based Programming, Database & Software Project Management.

          Extracurricular Activities
            - Programming Study Club (Kelompok Studi Pemrograman).
            - University Student Choir (Paduan Suara Mahasiswa UAJY).

