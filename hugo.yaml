  # projects
  projects:
    enable: true
    # title: "Custom Name"
    items:
      - title: FlowGuard AI
        content: This project simulates a real-world manufacturing environment where an AI agent continuously monitors and audits industrial automation logic for security vulnerabilities and logic flaws.
        image: /images/projects/flowguard.png
        slug: flowguard-ai
        featured:
          name: Demo
          link: https://hugo-profile.netlify.app
        badges:
          - "AI Agent"
          - "Node-RED"
          - "Ollama"
          - "FastAPI"
          - "Docker"
        links:
          - icon: fab fa-github
            url: https://github.com/FrienDotJava/manufacture-security

      - title: BPJS Hospital Readmission Prediction
        content: MLOps project to predict 30-day hospital readmissions for BPJS patients in Indonesia and includes an interactive dashboard for regional and demographic analysis.
        image: /images/projects/bpjs.png
        slug: readmission-prediction
        featured:
          name: Dashboard
          link: https://bpjs-eda-report.streamlit.app/
        badges:
          - "MLOps"
          - "Classification"
          - "GCP"
          - "Streamlit"
          - "Optuna"
          - "Evidently AI"
          - "DVC"
          - "Featuretools"
          - "MLFlow"
          - "FastAPI"
        links:
          - icon: fab fa-github
            url: https://github.com/FrienDotJava/bpjs-hospital-readmission

      - title: Multilingual Translator (Local Indonesia languages to Bahasa Indonesia)
        content: I fine-tuned LLMs to translate 5 local languages in Indonesia (Javanese, Balinese, Minangkabau, Sundanese, and Dayak) to Bahasa Indonesia.
        image: /images/projects/translator.png
        featured:
          name: Demo
          link: https://multilingual-nmt-demo.streamlit.app/
        badges:
          - "NLP"
          - "Transformer"
          - "Machine Translation"
          - "HuggingFace"

      - title: Product Recommendation System
        content: Product recommendation system built using anime dataset as a proxy. Users can rate anime they have watched, and the system will generate new recommendations based on their ratings.
        image: /images/projects/anime.png
        featured:
          name: Demo
          link: https://anime-recommendation-next-app.vercel.app/
        badges:
          - "MLOps"
          - "Recommender System"
          - "MLFlow"
          - "DVC"
          - "CI/CD"
          - "GCS"
        links:
          - icon: fab fa-github
            url: https://github.com/FrienDotJava/anime-recommendation-app

      - title: Income Prediction System
        content: A modular machine-learning project that predicts whether a person’s annual income is > $50K or ≤ $50K.
        image: /images/projects/income.png
        featured:
          name: Demo
          link: https://income-prediction1.streamlit.app/
        badges:
          - "MLOps"
          - "Classification"
          - "MLFlow"
          - "DVC"
        links:
          - icon: fab fa-github
            url: https://github.com/FrienDotJava/income-prediction

      - title: Beijing Air Quality Analysis
        content: An end-to-end data analysis project exploring air quality across multiple districts in Beijing. Includes exploratory data analysis in Jupyter Notebook and an interactive Streamlit dashboard for visualizing pollutant trends and patterns.
        image: /images/projects/air-quality.png
        featured:
          name: Demo
          link: https://air-quality-analysis-a4zkrusgbn4jfwznqjuxcr.streamlit.app/
        badges:
          - "Data Analysis"
          - "Air Quality"
          - "Streamlit"
        links:
          - icon: fab fa-github
            url: https://github.com/FrienDotJava/air-quality-analysis

