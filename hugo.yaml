      github: https://github.com/FrienDotJava
      linkedin: https://www.linkedin.com/in/frendy-frendy/
      instagram: https://instagram.com/ntizz_

  # List pages like blogs and posts
  listPages:
    disableFeaturedImage: false

  # Single pages like blog and post
  singlePages:
    socialShare: true
    readTime:
      enable: true
      content: "min read"
    scrollprogress:
      enable: true
    tags:
      openInNewTab: true

